<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#09090f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="April Skies">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>April Skies — Night Sky Guide April 2026</title>
<style>
  :root {
    --bg:#09090f; --card:#141428; --border:rgba(255,255,255,0.08);
    --border2:rgba(255,255,255,0.16); --text:#e8e8f0; --muted:#9090b0;
    --dim:#5a5a80; --gold:#f0c040; --gold2:#b88a20; --teal:#40c0a0;
    --purple:#9070d0; --warn:#e07030;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;height:100%;overflow:hidden;}

  /* ── TOP NAV ── */
  #topnav{
    position:fixed;top:0;left:0;right:0;height:38px;
    background:rgba(9,9,15,0.98);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;gap:3px;
    z-index:300;padding:0 10px;overflow-x:auto;scrollbar-width:none;
  }
  #topnav::-webkit-scrollbar{display:none;}
  #topnav a{
    font-family:'Helvetica Neue',Arial,sans-serif;font-size:10.5px;
    color:var(--dim);text-decoration:none;padding:4px 9px;
    border-radius:5px;border:1px solid transparent;
    transition:color .15s,border-color .15s,background .15s;
    letter-spacing:.04em;white-space:nowrap;cursor:pointer;flex-shrink:0;
  }
  #topnav a:hover{color:var(--muted);}
  #topnav a.active{color:var(--gold);border-color:var(--gold2);background:rgba(240,192,64,0.07);}

  /* ── OBJECT SUB-NAV ── */
  #subnav{
    position:fixed;top:38px;left:0;right:0;height:28px;
    background:rgba(9,9,15,0.96);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
    display:none;align-items:center;justify-content:center;gap:2px;
    z-index:299;padding:0 10px;overflow-x:auto;scrollbar-width:none;
  }
  #subnav::-webkit-scrollbar{display:none;}
  #subnav.visible{display:flex;}
  #subnav a{
    font-family:'Helvetica Neue',Arial,sans-serif;font-size:9.5px;
    color:var(--dim);text-decoration:none;padding:3px 8px;
    border-radius:4px;border:1px solid transparent;
    transition:color .15s,border-color .15s,background .15s;
    letter-spacing:.04em;white-space:nowrap;cursor:pointer;flex-shrink:0;
  }
  #subnav a:hover{color:var(--muted);}
  #subnav a.active{color:var(--teal);border-color:rgba(64,192,160,0.4);background:rgba(64,192,160,0.07);}

  /* ── SLIDES ── */
  #slides{position:fixed;left:0;right:0;bottom:0;overflow:hidden;}
  .slide{
    position:absolute;top:0;left:0;right:0;bottom:0;
    overflow-y:auto;padding:26px 18px 56px;
    opacity:0;transform:translateY(40px);
    transition:opacity .42s ease,transform .42s ease;
    pointer-events:none;
    display:flex;flex-direction:column;align-items:center;
  }
  .slide.active{opacity:1;transform:translateY(0);pointer-events:all;}
  .slide-inner{width:100%;max-width:720px;}

  #progress{position:fixed;bottom:0;left:0;height:2px;background:var(--gold);transition:width .4s ease;z-index:400;opacity:.55;}
  #counter{position:fixed;bottom:8px;right:12px;font-family:'Helvetica Neue',sans-serif;font-size:10px;color:var(--dim);letter-spacing:.08em;z-index:400;}

  /* ── COVER ── */
  .cover-wrap{text-align:center;padding:28px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 130px);}
  .cover-dots{display:flex;gap:6px;justify-content:center;margin-bottom:22px;}
  .cover-dot{width:5px;height:5px;border-radius:50%;background:var(--dim);}
  .cover-dot.lit{background:var(--gold);}
  .cover-title{font-size:clamp(46px,10vw,82px);font-weight:400;letter-spacing:-.025em;color:#fff;line-height:1;margin-bottom:6px;}
  .cover-italic{font-style:italic;color:var(--gold);}
  .cover-sub{font-size:12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;margin:14px 0 24px;}
  .spec-row{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:26px;}
  .pill{font-family:'Helvetica Neue',sans-serif;font-size:11px;padding:4px 12px;border:1px solid var(--border2);border-radius:20px;color:var(--muted);letter-spacing:.04em;}
  .pill.hi{border-color:var(--gold2);color:var(--gold);}
  .cover-hint{display:flex;align-items:center;gap:8px;font-family:'Helvetica Neue',sans-serif;font-size:11px;color:var(--dim);flex-wrap:wrap;justify-content:center;}
  .cover-hint kbd{display:inline-block;padding:2px 7px;border:1px solid var(--border2);border-radius:4px;font-size:10px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;background:rgba(255,255,255,0.04);}
  .cover-arrow{font-size:18px;color:var(--gold);display:block;margin-top:14px;animation:bounce 2s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}

  /* ── TYPOGRAPHY ── */
  h2.stitle{font-size:clamp(19px,4vw,27px);font-weight:400;color:#fff;margin-bottom:4px;}
  .sintro{font-size:12px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;margin-bottom:15px;letter-spacing:.03em;}

  /* ── PLANNER ── */
  .planner-wrap{overflow-x:auto;}
  table.planner{width:100%;border-collapse:collapse;font-family:'Helvetica Neue',sans-serif;font-size:12px;}
  table.planner th{text-align:left;padding:7px 9px;color:var(--dim);font-weight:400;letter-spacing:.08em;text-transform:uppercase;font-size:10px;border-bottom:1px solid var(--border2);}
  table.planner td{padding:8px 9px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top;}
  table.planner tr:hover td{background:rgba(255,255,255,0.02);}
  .moon-warn{color:var(--warn);font-size:11px;}
  .dark-win{color:var(--teal);font-size:11px;}
  .er{display:flex;gap:2px;align-items:center;}
  .sf{width:10px;height:10px;background:var(--gold);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);flex-shrink:0;}
  .se{width:10px;height:10px;background:#2a2a4a;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);flex-shrink:0;}

  /* ── MOON ── */
  .phase-strip{display:flex;overflow-x:auto;padding:10px 0 12px;scrollbar-width:none;}
  .phase-strip::-webkit-scrollbar{display:none;}
  .phase-day{text-align:center;min-width:21px;}
  .phase-day .dn{font-size:8px;color:var(--dim);font-family:'Helvetica Neue',sans-serif;display:block;margin-bottom:1px;}
  .phase-day .pm{font-size:14px;display:block;}
  .phase-day.nm .pm{filter:drop-shadow(0 0 4px rgba(240,192,64,0.9));}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .feat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px;}
  .feat-card h4{font-size:12px;font-weight:400;color:var(--gold);font-family:'Helvetica Neue',sans-serif;margin-bottom:5px;letter-spacing:.04em;}
  .feat-card p{font-size:12px;color:var(--muted);line-height:1.6;}
  .feat-card .best{font-size:11px;color:var(--teal);margin-top:5px;font-family:'Helvetica Neue',sans-serif;}

  /* ── PLANETS ── */
  .planet-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:12px;}
  .pcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .pcard h3{font-size:18px;font-weight:400;color:#fff;margin-bottom:9px;}
  .prow{display:flex;justify-content:space-between;font-size:12px;font-family:'Helvetica Neue',sans-serif;padding:5px 0;border-bottom:1px solid var(--border);}
  .prow:last-of-type{border-bottom:none;}
  .prow .lbl{color:var(--dim);}
  .prow .val{color:var(--text);}
  .pcard-note{font-size:11px;color:var(--muted);font-style:italic;margin-top:9px;line-height:1.5;}
  .pcard-ease{margin-top:8px;display:flex;gap:3px;}
  .bonus{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:11px 13px;margin-bottom:9px;}
  .bonus h4{font-size:12px;color:var(--teal);font-family:'Helvetica Neue',sans-serif;font-weight:500;margin-bottom:4px;}
  .bonus p{font-size:12px;color:var(--muted);line-height:1.6;}
  .bonus.wb{border-left-color:var(--warn);}
  .bonus.wb h4{color:#c08060;}

  /* ── OBJECT CARD ── */
  .obj-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;overflow:hidden;}
  .obj-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
  .obj-name{font-size:18px;font-weight:400;color:#fff;}
  .obj-type{font-size:11px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;margin-top:3px;letter-spacing:.03em;}
  .ease-label{font-size:10px;color:var(--dim);font-family:'Helvetica Neue',sans-serif;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;text-align:right;}
  .obj-meta{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border);}
  .obj-meta-item{padding:8px 12px;border-right:1px solid var(--border);}
  .obj-meta-item:last-child{border-right:none;}
  .mk{font-size:10px;color:var(--dim);font-family:'Helvetica Neue',sans-serif;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
  .mv{font-size:12px;color:var(--text);font-family:'Helvetica Neue',sans-serif;}
  .obj-body{display:grid;grid-template-columns:1fr 142px;}
  .obj-desc{padding:12px 14px;border-right:1px solid var(--border);}
  .obj-desc h4{font-size:10px;color:var(--dim);font-family:'Helvetica Neue',sans-serif;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
  .obj-desc p{font-size:12.5px;color:var(--muted);line-height:1.65;}
  .obj-sketch-col{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;gap:6px;}
  /* two-sketch variant */
  .obj-body.two-sketch{grid-template-columns:1fr;}
  .obj-body.two-sketch .obj-desc{border-right:none;border-bottom:1px solid var(--border);}
  .two-sketch-row{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border);}
  .two-sketch-cell{display:flex;flex-direction:column;align-items:center;padding:12px;gap:6px;border-right:1px solid var(--border);}
  .two-sketch-cell:last-child{border-right:none;}
  .sketch-lbl{font-size:10px;color:var(--dim);font-family:'Helvetica Neue',sans-serif;text-align:center;line-height:1.4;}
  .obj-finder{padding:9px 14px 12px;border-top:1px solid var(--border);}
  .obj-finder h4{font-size:10px;color:var(--dim);font-family:'Helvetica Neue',sans-serif;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
  .obj-finder p{font-size:12px;color:var(--muted);line-height:1.6;}
  .obj-note{padding:7px 14px;border-top:1px solid var(--border);font-size:11px;color:#c08060;font-family:'Helvetica Neue',sans-serif;line-height:1.5;background:rgba(224,112,48,0.06);}

  /* ── CONDITIONS ── */
  .cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:16px;}
  .cond-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px;}
  .cond-box h4{font-size:12px;color:var(--gold);font-family:'Helvetica Neue',sans-serif;font-weight:400;margin-bottom:5px;}
  .cond-box p{font-size:12px;color:var(--muted);line-height:1.6;}
  .checklist{list-style:none;margin-bottom:18px;}
  .checklist li{display:flex;gap:10px;font-size:12px;color:var(--muted);padding:7px 0;border-bottom:1px solid var(--border);line-height:1.5;}
  .checklist li:last-child{border-bottom:none;}
  .chk{color:var(--border2);flex-shrink:0;}
  .log-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  .log-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px;}
  .log-box h4{font-size:10px;color:var(--dim);font-family:'Helvetica Neue',sans-serif;text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;}
  .log-line{font-size:11px;color:var(--dim);font-family:'Helvetica Neue',sans-serif;border-bottom:1px solid var(--border);padding:5px 0;}
  .sketch-pair{display:flex;gap:12px;justify-content:center;padding-top:4px;}
  .sketch-mini{text-align:center;}
  .sketch-mini span{font-size:9px;color:var(--dim);font-family:'Helvetica Neue',sans-serif;display:block;margin-top:4px;}

  /* ── GLOSSARY ── */
  .gloss-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
  .gloss-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:9px 11px;}
  .gloss-term{font-size:12px;color:var(--gold);font-family:'Helvetica Neue',sans-serif;margin-bottom:3px;}
  .gloss-def{font-size:11px;color:var(--muted);line-height:1.5;}
  .limit-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--purple);border-radius:0 8px 8px 0;padding:11px 13px;font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:18px;}
  .quote-box{text-align:center;padding:18px;font-style:italic;color:var(--dim);font-size:13px;border-top:1px solid var(--border);}

  @media(max-width:520px){
    #topnav{justify-content:flex-start;}
    #subnav{justify-content:flex-start;}
    .planet-grid,.two-col,.cond-grid,.log-grid,.gloss-grid{grid-template-columns:1fr;}
    .obj-body{grid-template-columns:1fr;}
    .obj-body .obj-sketch-col{border-left:none;border-top:1px solid var(--border);}
    .two-sketch-row{grid-template-columns:1fr;}
    .two-sketch-cell{border-right:none;border-bottom:1px solid var(--border);}
    .two-sketch-cell:last-child{border-bottom:none;}
    .obj-meta{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<nav id="topnav"></nav>
<div id="subnav"></div>
<div id="slides"></div>
<div id="progress"></div>
<div id="counter"></div>
<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const SLIDES=[
  {id:'cover',      label:'Cover',       group:null},
  {id:'planner',    label:'Planner',     group:null},
  {id:'moon',       label:'Moon',        group:null},
  {id:'planets',    label:'Planets',     group:null},
  {id:'objects',    label:'Objects',     group:null, isGroup:true},
  {id:'m42',        label:'M42',         group:'objects'},
  {id:'m4647',      label:'M46 / M47',   group:'objects'},
  {id:'m44',        label:'M44',         group:'objects'},
  {id:'m3',         label:'M3',          group:'objects'},
  {id:'algieba',    label:'Algieba',     group:'objects'},
  {id:'leo',        label:'Leo Triplet', group:'objects'},
  {id:'m51',        label:'M51',         group:'objects'},
  {id:'conditions', label:'Conditions',  group:null},
  {id:'glossary',   label:'Glossary',    group:null},
];
const RENDERABLE=SLIDES.filter(s=>!s.isGroup);

function E(n){return Array.from({length:5},(_,i)=>`<div class="${i<n?'sf':'se'}"></div>`).join('');}
const PH=['🌕','🌕','🌖','🌖','🌖','🌖','🌗','🌗','🌗','🌗','🌘','🌘','🌘','🌘','🌑','🌑','🌑','🌒','🌒','🌒','🌓','🌓','🌓','🌓','🌔','🌔','🌔','🌔','🌔','🌕'];
const phStrip=PH.map((p,i)=>`<div class="phase-day${i===16?' nm':''}"><span class="dn">${i+1}</span><span class="pm">${p}</span></div>`).join('');

// ── SKETCHES ──────────────────────────────────────────────────────────────────
const SK={
m42:`<svg width="110" height="110" viewBox="0 0 140 140"><defs><clipPath id="sk_m42"><circle cx="70" cy="70" r="62"/></clipPath></defs><circle cx="70" cy="70" r="66" fill="#0a0a14"/><g clip-path="url(#sk_m42)"><circle cx="70" cy="70" r="62" fill="#0c0c18"/><ellipse cx="70" cy="72" rx="34" ry="28" fill="#3a3060" opacity=".45" transform="rotate(-15 70 72)"/><ellipse cx="62" cy="68" rx="24" ry="18" fill="#5040a0" opacity=".4" transform="rotate(-20 62 68)"/><ellipse cx="78" cy="76" rx="20" ry="14" fill="#4838a0" opacity=".35" transform="rotate(10 78 76)"/><ellipse cx="70" cy="70" rx="12" ry="10" fill="#7868c8" opacity=".55"/><ellipse cx="70" cy="70" rx="6" ry="5" fill="#c0b0f0" opacity=".7"/><circle cx="69" cy="69" r="1.4" fill="#fff" opacity=".98"/><circle cx="72" cy="68" r="1.2" fill="#fff" opacity=".92"/><circle cx="71" cy="72" r="1.1" fill="#fff" opacity=".88"/><circle cx="67" cy="71" r="1.0" fill="#fff" opacity=".85"/><circle cx="40" cy="38" r="1.8" fill="#ffe8c0" opacity=".9"/><circle cx="100" cy="45" r="1.4" fill="#fff" opacity=".7"/><circle cx="32" cy="80" r="1.2" fill="#fff" opacity=".6"/><circle cx="108" cy="90" r="1.0" fill="#fff" opacity=".55"/><circle cx="55" cy="110" r="1.2" fill="#fff" opacity=".5"/></g><circle cx="70" cy="70" r="62" fill="none" stroke="#fff" stroke-width="1" opacity=".14"/></svg>`,

// M47 — brighter, looser

    <div class="obj-desc"><h4>What you will see</h4><p>M46 and M47 are 1.3° apart — just outside your 1.4° true FOV at 36×, so observe them separately, then mentally connect the pair. <strong style="color:var(--text);font-weight:normal">M47</strong> is the showpiece: a bright, loose scatter of prominent stars including several with a warm yellow-orange tinge. <strong style="color:var(--text);font-weight:normal">M46</strong> is a complete contrast — a much denser, more uniform cluster of fainter stars, like a fine dusting of salt. At 100× look carefully on M46's northern edge for NGC 2438: a tiny, faint circular smudge — a foreground planetary nebula that just happens to sit in front of the cluster.</p></div>
  </div>
  <div class="two-sketch-row">
    <div class="two-sketch-cell">${SK.m47}<div class="sketch-lbl">M47 · 25mm · 36×<br>bright &amp; loose</div></div>
    <div class="two-sketch-cell">${SK.m46}<div class="sketch-lbl">M46 · 25mm · 36×<br>dense · NGC 2438 ring visible</div></div>
  </div>
  <div class="obj-finder"><h4>How to find it</h4><p>Find Sirius — the brightest star in the sky, blazing in the SW. Scan about 12–14° to the east and slightly north (roughly 1.5 fist-widths). M47 appears first as a bright fuzzy patch; M46 is ~1.3° further east. Sweep between them at low power to appreciate the contrast.</p></div>
</div>`,

m3:`<div class="obj-card">

algieba:`<div class="obj-card">
  <div class="obj-head">

leo:`<div class="obj-card">

conditions:`<h2 class="stitle">Conditions &amp; observer's log</h2>
<div class="cond-grid">
  <div class="cond-box"><h4>Transparency vs seeing</h4><p>Transparency = how clear the air is (affects faint objects like galaxies). Seeing = how steady the air is (affects fine detail and splitting double stars at 100×). For galaxies: prioritise transparency. For Algieba, planets, and the Moon: prioritise seeing.</p></div>
  <div class="cond-box"><h4>Averted vision</h4><p>Look slightly to the side of a faint object to use the eye's rod cells (~10–15° off-centre). Essential for the Leo Triplet, M51, and the granular halo of M3. Also helps detect NGC 2438 in M46. Takes practice — becomes natural.</p></div>
</div>
<p style="font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;font-family:'Helvetica Neue',sans-serif;margin-bottom:9px;">Pre-session checklist</p>
<ul class="checklist">
  <li><span class="chk">○</span>Let telescope cool outside 30–45 min — a warm mirror creates thermal currents that blur the image significantly</li>
  <li><span class="chk">○</span>Allow 20 min for eyes to dark-adapt — red torch only, avoid all white light</li>
  <li><span class="chk">○</span>Check Moon phase — plan deep sky sessions around Apr 10–27 new moon window</li>
  <li><span class="chk">○</span>Start with 25mm (36×) to find every object, then switch to 9mm (100×) for detail</li>
  <li><span class="chk">○</span>Clean eyepieces only if needed — lens cloth, breathe gently on glass first, never tissue</li>
  <li><span class="chk">○</span>Note time, seeing (1–5) and transparency (1–5) — patterns across sessions reveal your best nights</li>
</ul>
<div class="log-grid">
  <div class="log-box"><h4>Session log</h4>
    <div class="log-line">Date: ___________________</div>
    <div class="log-line">Time start: ______________</div>
    <div class="log-line">Seeing (1–5): ____________</div>
    <div class="log-line">Transparency (1–5): ______</div>
    <div class="log-line">Objects observed: ________</div>
    <div class="log-line">Notes: __________________</div>
  </div>
  <div class="log-box"><h4>Eyepiece sketches</h4>
    <div class="sketch-pair">
      <div class="sketch-mini"><svg width="56" height="56" viewBox="0 0 60 60"><circle cx="30" cy="30" r="27" fill="#0d0d1c"/><circle cx="30" cy="30" r="27" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/></svg><span>25mm · 36×</span></div>
      <div class="sketch-mini"><svg width="56" height="56" viewBox="0 0 60 60"><circle cx="30" cy="30" r="27" fill="#0d0d1c"/><circle cx="30" cy="30" r="27" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/></svg><span>9mm · 100×</span></div>
    </div>
  </div>
</div>`,

glossary:`<h2 class="stitle">Quick glossary</h2>
<div class="gloss-grid">
  <div class="gloss-item"><div class="gloss-term">Magnitude (mag)</div><div class="gloss-def">Brightness scale — lower is brighter. Sun −26, naked eye limit ~6, your scope reaches ~12.</div></div>
  <div class="gloss-item"><div class="gloss-term">FOV</div><div class="gloss-def">True FOV = AFOV ÷ magnification. At 36× with 52° AFOV: 52÷36 = 1.44°. The Moon is 0.5° wide.</div></div>
  <div class="gloss-item"><div class="gloss-term">Averted vision</div><div class="gloss-def">Look slightly off-centre to use rod cells. Essential for faint galaxies and M3's halo texture.</div></div>
  <div class="gloss-item"><div class="gloss-term">Seeing</div><div class="gloss-def">Atmospheric steadiness. Poor seeing blurs stars and prevents double star splits.</div></div>
  <div class="gloss-item"><div class="gloss-term">Terminator</div><div class="gloss-def">Light/dark boundary on the Moon. The best place to see shadow-enhanced crater detail.</div></div>
  <div class="gloss-item"><div class="gloss-term">Dark adaptation</div><div class="gloss-def">Eyes need ~20 min in full darkness for peak sensitivity. One white light flash resets it.</div></div>
  <div class="gloss-item"><div class="gloss-term">Arcsecond (″)</div><div class="gloss-def">1/3600 of a degree. Algieba's 4.6″ gap is comfortably split at 100× on a steady night.</div></div>
  <div class="gloss-item"><div class="gloss-term">Bortle scale</div><div class="gloss-def">1–9 sky darkness scale. Leo Triplet and NGC 3628 need Bortle 4 or better.</div></div>
  <div class="gloss-item"><div class="gloss-term">Trapezium</div><div class="gloss-def">Four hot young stars at M42's core — a tiny trapezoid, clearly split at 100×.</div></div>
  <div class="gloss-item"><div class="gloss-term">AFOV</div><div class="gloss-def">Apparent field of view of the eyepiece. Your 25mm has ~52°. Divide by magnification for true FOV.</div></div>
</div>
<div class="limit-box"><strong style="color:var(--text)">Your telescope's limits:</strong> 114mm aperture · limiting magnitude ~12 under dark skies · max useful magnification ~230× (100× practical ceiling most nights) · 265× more light than the naked eye · resolving power ~1 arcsecond on the best nights · cannot fully resolve globular clusters — only granular halo texture.</div>
<div class="quote-box">"The universe is under no obligation to make sense to you." — Neil deGrasse Tyson</div>`
};

// ── BUILD DOM ─────────────────────────────────────────────────────────────────
const topnav=document.getElementById('topnav');
const subnav=document.getElementById('subnav');
const container=document.getElementById('slides');
const progress=document.getElementById('progress');
const counter=document.getElementById('counter');
let current=0,animating=false;

SLIDES.forEach(s=>{
  if(s.group==='objects')return;
  const a=document.createElement('a');
  a.textContent=s.label;
  if(s.isGroup){
    a.dataset.group='objects';
    a.addEventListener('click',()=>{const fi=RENDERABLE.findIndex(r=>r.group==='objects');goTo(fi);});
  }else{
    const idx=RENDERABLE.findIndex(r=>r.id===s.id);
    a.dataset.idx=idx;
    a.addEventListener('click',()=>goTo(idx));
  }
  topnav.appendChild(a);
});

RENDERABLE.forEach((s,idx)=>{
  if(s.group!=='objects')return;
  const a=document.createElement('a');
  a.textContent=s.label;
  a.dataset.idx=idx;
  a.addEventListener('click',()=>goTo(idx));
  subnav.appendChild(a);
});

RENDERABLE.forEach((s,i)=>{
  const div=document.createElement('div');
  div.className='slide'+(i===0?' active':'');
  div.id=s.id;
  const inner=document.createElement('div');
  inner.className='slide-inner';
  inner.innerHTML=C[s.id]||`<h2 class="stitle">${s.label}</h2>`;
  div.appendChild(inner);
  container.appendChild(div);
});

function setTop(sub){container.style.top=sub?'66px':'38px';}

function updateUI(idx){
  const slide=RENDERABLE[idx];
  const isObj=slide.group==='objects';
  topnav.querySelectorAll('a').forEach(a=>{
    if(a.dataset.group==='objects') a.classList.toggle('active',isObj);
    else if(a.dataset.idx!==undefined) a.classList.toggle('active',+a.dataset.idx===idx);
  });
  subnav.classList.toggle('visible',isObj);
  setTop(isObj);
  const objSlides=RENDERABLE.filter(s=>s.group==='objects');
  subnav.querySelectorAll('a').forEach((a,i)=>a.classList.toggle('active',objSlides[i]&&objSlides[i].id===slide.id));
  if(isObj){const al=subnav.querySelector('a.active');if(al)al.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
  const atl=topnav.querySelector('a.active');if(atl)atl.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  progress.style.width=(idx/(RENDERABLE.length-1)*100)+'%';
  counter.textContent=(idx+1)+' / '+RENDERABLE.length;
}

function goTo(idx){
  if(idx===current||animating||idx<0||idx>=RENDERABLE.length)return;
  animating=true;
  const all=container.querySelectorAll('.slide');
  const from=all[current],to=all[idx];
  const fwd=idx>current;
  to.style.transition='none';
  to.style.opacity='0';
  to.style.transform=fwd?'translateY(40px)':'translateY(-40px)';
  to.classList.add('active');
  to.scrollTop=0;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    to.style.transition='';to.style.opacity='1';to.style.transform='translateY(0)';
    from.style.opacity='0';from.style.transform=fwd?'translateY(-40px)':'translateY(40px)';
    setTimeout(()=>{from.classList.remove('active');from.style.cssText='';animating=false;},450);
  }));
  current=idx;updateUI(idx);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goTo(current+1);}
  else if(e.key==='ArrowLeft'){e.preventDefault();goTo(current-1);}
});

let wAcc=0,wT=null;
container.addEventListener('wheel',e=>{
  const el=container.querySelectorAll('.slide')[current];
  const atB=el.scrollTop+el.clientHeight>=el.scrollHeight-2;
  const atT=el.scrollTop<=0;
  if((e.deltaY>0&&atB)||(e.deltaY<0&&atT)){
    e.preventDefault();wAcc+=e.deltaY;clearTimeout(wT);
    wT=setTimeout(()=>{if(Math.abs(wAcc)>20)goTo(wAcc>0?current+1:current-1);wAcc=0;},80);
  }
},{passive:false});

let tY=0;
container.addEventListener('touchstart',e=>{tY=e.touches[0].clientY;},{passive:true});
container.addEventListener('touchend',e=>{const dy=tY-e.changedTouches[0].clientY;if(Math.abs(dy)>44)goTo(dy>0?current+1:current-1);},{passive:true});

setTop(false);updateUI(0);

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>console.log('SW registered',r.scope))
      .catch(e=>console.log('SW failed',e));
  });
}
</script>
</body>
</html>
